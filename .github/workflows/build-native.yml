name: Build Native App

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev librsvg2-dev

      - name: Build Dashboard
        run: |
          cd AgentOS/native_app
          npm install
          npm run build

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "AgentOS Native Build v__VERSION__"
          releaseBody: "Automated build of the AgentOS Mash Dashboard."
          releaseDraft: true
          prerelease: false
          args: --target x86_64-unknown-linux-gnu

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Build Dashboard & Android APK
        run: |
          cd AgentOS/native_app
          npm install
          npm run build
          # Use non-interactive mode for android init
          npm run tauri android init || true 
          npm run tauri android build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: agentos-android-apk
          path: AgentOS/native_app/src-tauri/gen/android/app/build/outputs/apk/release/app-release.apk
