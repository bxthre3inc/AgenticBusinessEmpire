name: AgentOS CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v4
      with:
        python-version: "3.13"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r AgentOS/requirements.txt
        # Add extra deps if needed
        pip install fastapi uvicorn aiosqlite httpx psutil

    - name: Run Core RQE Benchmarks
      run: |
        echo "Running RQE Spatial Query Latency Benchmark..."
        PYTHONPATH=. python AgentOS/kernel/tests/benchmark_rqe.py

    - name: Run Starting5 A2A Flow Tests
      run: |
        echo "Running A2AMessage Bus Integration Tests..."
        PYTHONPATH=. python AgentOS/tenants/starting5/tests/test_a2a.py

    - name: Run Generic Tenant Validation
      run: |
        echo "Validating Generic Template isolation boundary..."
        PYTHONPATH=. python AgentOS/tenants/generic_template/tests/test_generic.py

    - name: Run Corporate Operations Audits
      run: |
        echo "Testing Holding Company Budget and HR Constraints..."
        PYTHONPATH=. python AgentOS/tests/test_corp_agents.py

    - name: Run Rogue Agent Breach Tests
      run: |
        echo "Testing Adversarial Rogue Agent..."
        PYTHONPATH=. python AgentOS/tests/test_rogue_isolation.py
