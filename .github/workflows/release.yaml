name: AgentOS

on:
  push:
    branches: [master, main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Test & Package Server (for ZO hosting)
  test-package-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with: {python-version: '3.12'}
      - run: |
          pip install -r AgentOS/requirements.txt
          pip install fastapi uvicorn aiosqlite httpx psutil
          PYTHONPATH=. python AgentOS/tests/test_corp_agents.py || true
      - run: zip -r agentos-server.zip AgentOS/ -x '**/node_modules/*' '**/__pycache__/*'
      - uses: actions/upload-artifact@v4
        with: {name: agentos-server, path: agentos-server.zip}

  # Build Linux Desktop (Tauri .deb for Kali)
  build-linux-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: '20'}
      - run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev
      - run: |
          cd AgentOS/native_app && npm install && npm run build
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'AgentOS v__VERSION__'
          args: --target x86_64-unknown-linux-gnu

  # Build Android APK
  build-android-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: zulu, java-version: '17'}
      - uses: android-actions/setup-android@v3
      - uses: actions/setup-node@v4
        with: {node-version: '20'}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi
      - run: |
          cd AgentOS/native_app
          npm install
          npm run tauri android init -- --ci
          npm run tauri android build
      - uses: actions/upload-artifact@v4
        with:
          name: agentos-android
          path: 'AgentOS/native_app/src-tauri/gen/android/app/build/outputs/**/*.apk'

  # Auto-Release on tags
  release:
    needs: [test-package-server, build-linux-deb, build-android-apk]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v1
        with:
          files: '**/*.{zip,deb,apk}'
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
